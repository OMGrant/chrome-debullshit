name: validate

on:
  push:
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Policy JSON is valid
        run: python3 -c "import json; json.load(open('policy/debullshit.json'))"

      - name: Shell scripts parse
        run: |
          bash -n install.sh
          bash -n macos/install.sh
          bash -n scripts/generate.sh

      - name: Generated artifacts are in sync with the JSON
        run: ./scripts/generate.sh --check
